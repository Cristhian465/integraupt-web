services:
  db:
    image: mariadb:10.11
    container_name: integraupt-db
    environment:
      MARIADB_DATABASE: sisintupt
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
    volumes:
      - db_data:/var/lib/mysql
      - ./Integraupt-Backend/docker/db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [integraupt]

  servicio-usuarios:
    build:
      context: ./Integraupt-Backend/servicio-usuarios
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.2" }
    env_file: ./Integraupt-Backend/servicio-usuarios/.env.docker
    command: sh -c "php artisan migrate --force --no-interaction; php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      db: { condition: service_healthy }
    ports: ["8092:8000"]
    networks: [integraupt]

  servicio-login:
    build:
      context: ./Integraupt-Backend/servicio-login
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.2" }
    env_file: ./Integraupt-Backend/servicio-login/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8081:8000"]
    networks: [integraupt]

  servicio-espacios:
    build:
      context: ./Integraupt-Backend/servicio-espacios
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.2" }
    env_file: ./Integraupt-Backend/servicio-espacios/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8082:8000"]
    networks: [integraupt]

  servicio-horarios-curso:
    build:
      context: ./Integraupt-Backend/servicio-horarios-curso
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.4" }
    env_file: ./Integraupt-Backend/servicio-horarios-curso/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8083:8000"]
    networks: [integraupt]

  servicio-reserva:
    build:
      context: ./Integraupt-Backend/servicio-reserva
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.2" }
    env_file: ./Integraupt-Backend/servicio-reserva/.env.docker
    depends_on: [servicio-usuarios, servicio-qr, servicio-sanciones]
    ports: ["8084:8000"]
    networks: [integraupt]

  servicio-horarios:
    build:
      context: ./Integraupt-Backend/servicio-horarios
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.2" }
    env_file: ./Integraupt-Backend/servicio-horarios/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8085:8000"]
    networks: [integraupt]

  servicio-incidencia:
    build:
      context: ./Integraupt-Backend/servicio-incidencia
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.4" }
    env_file: ./Integraupt-Backend/servicio-incidencia/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8086:8000"]
    networks: [integraupt]

  servicio-sanciones:
    build:
      context: ./Integraupt-Backend/servicio-sanciones
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.4" }
    env_file: ./Integraupt-Backend/servicio-sanciones/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8087:8000"]
    networks: [integraupt]

  servicio-adreserva:
    build:
      context: ./Integraupt-Backend/servicio-adreserva
      dockerfile: ../docker/adreserva.Dockerfile
    env_file: ./Integraupt-Backend/servicio-adreserva/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8088:8000"]
    networks: [integraupt]

  servicio-reportes:
    build:
      context: ./Integraupt-Backend/servicio-reportes
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.4" }
    env_file: ./Integraupt-Backend/servicio-reportes/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8089:8000"]
    networks: [integraupt]

  servicio-qr:
    build:
      context: ./Integraupt-Backend/servicio-qr
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.2" }
    env_file: ./Integraupt-Backend/servicio-qr/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8090:8000"]
    networks: [integraupt]

  servicio-auditoria:
    build:
      context: ./Integraupt-Backend/servicio-auditoria
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.4" }
    env_file: ./Integraupt-Backend/servicio-auditoria/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8091:8000"]
    networks: [integraupt]

  servicio-psicologia:
    build:
      context: ./Integraupt-Backend/servicio-psicologia
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.2" }
    env_file: ./Integraupt-Backend/servicio-psicologia/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8093:8000"]
    networks: [integraupt]

  servicio-burra:
    build:
      context: ./Integraupt-Backend/servicio-burra
      dockerfile: ../docker/laravel.Dockerfile
      args: { PHP_VERSION: "8.2" }
    env_file: ./Integraupt-Backend/servicio-burra/.env.docker
    depends_on: [servicio-usuarios]
    ports: ["8094:8000"]
    networks: [integraupt]

  frontend:
    build:
      context: ./integraupt-frontend
    ports: ["5173:5173"]
    depends_on:
      - servicio-login
      - servicio-espacios
      - servicio-horarios-curso
      - servicio-reserva
      - servicio-horarios
      - servicio-incidencia
      - servicio-sanciones
      - servicio-psicologia
      - servicio-adreserva
      - servicio-reportes
      - servicio-qr
      - servicio-auditoria
      - servicio-usuarios
      - servicio-burra
    networks: [integraupt]

networks:
  integraupt:
    driver: bridge

volumes:
  db_data:
